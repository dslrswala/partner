<!DOCTYPE html>
<html lang="en" data-t="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f1a">
<title>DSLRswala Partner Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────────── */
:root{
  --royal:#252359;--baby:#90CCFF;--orange:#F3861F;
  --green:#4CAF7D;--red:#E05252;--amber:#F5A623;
  --bg0:#0d0f1a;--bg1:#141629;--bg2:#1c1f38;--bg3:#242848;
  --txt:#f0f2ff;--txt2:#8892b0;--txt3:#505878;
  --line:#2a2f52;--hover:#1e2240;
  --sh:0 2px 12px rgba(0,0,0,.4);
  --r:10px;--r-sm:6px;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-t="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f6fb;--bg3:#eceef6;
  --txt:#1a1c2e;--txt2:#4a5068;--txt3:#9098b8;
  --line:#dde0ee;--hover:#f0f1fa;
  --sh:0 2px 12px rgba(37,35,89,.08);
}

/* ── RESET ───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);font-size:16px;line-height:1.5;
  background:var(--bg0);color:var(--txt);min-height:100vh;
  -webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input{font-family:var(--font)}
a{color:var(--baby)}

/* ── SCREENS ────────────────────────────────────────────────────── */
.screen{display:none;min-height:100vh}
.screen.on{display:flex;flex-direction:column}

/* ── TOPBAR ─────────────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;height:56px;
  background:var(--bg1);border-bottom:1px solid var(--line);
  box-shadow:var(--sh);
}
.topbar .logo img{height:30px;width:auto;mix-blend-mode:lighten;vertical-align:middle}
[data-t="light"] .topbar .logo img{mix-blend-mode:multiply;filter:invert(1)}
.topbar .pg-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);flex-shrink:0}
.topbar .pg-name{font-size:15px;font-weight:700;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sync{font-size:10px;font-family:var(--mono);color:var(--txt3);flex-shrink:0;display:none}
@media(min-width:480px){.topbar .sync{display:block}}
.tb-btn{width:36px;height:36px;border-radius:8px;background:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--txt2);font-size:15px;transition:background .15s;flex-shrink:0}
.tb-btn:hover{background:var(--hover)}
.spinning{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ADMIN TABS ─────────────────────────────────────────────────── */
.admin-tabs{
  display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--bg1);border-bottom:1px solid var(--line);
  padding:0 16px;
}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tabs.on{display:flex;gap:2px;flex-wrap:nowrap}
.ptab{
  padding:10px 16px;font-size:12px;font-weight:700;
  color:var(--txt2);background:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;min-height:44px;
  letter-spacing:.3px;
}
.ptab:hover{color:var(--txt)}
.ptab.on{color:var(--baby);border-color:var(--baby)}

/* ── WRAPPER ────────────────────────────────────────────────────── */
.wrap{width:100%;max-width:980px;margin:0 auto;padding:16px}
@media(min-width:768px){.wrap{padding:20px 24px}}

/* ── DEMO BADGE ─────────────────────────────────────────────────── */
.demo-badge{
  background:linear-gradient(90deg,var(--amber) 0%,var(--orange) 100%);
  color:#1a0a00;font-size:11px;font-weight:700;letter-spacing:.8px;
  text-align:center;padding:7px 16px;border-radius:var(--r-sm);
  margin-bottom:14px;
}

/* ── VINAY SUB-TABS ─────────────────────────────────────────────── */
.sub-tabs-wrap{display:none;margin-bottom:14px}
.sub-tabs-wrap.on{display:block}
.sub-tabs{
  display:flex;background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);
}
.sub-tab{
  flex:1;padding:11px 16px;font-size:12px;font-weight:700;
  color:var(--txt2);background:none;transition:all .18s;
  border-right:1px solid var(--line);letter-spacing:.3px;
  min-height:44px;
}
.sub-tab:last-child{border-right:none}
.sub-tab:hover{background:var(--hover);color:var(--txt)}
.sub-tab.on{background:var(--royal);color:var(--baby)}

/* ── ALERTS ─────────────────────────────────────────────────────── */
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.alert{
  display:flex;gap:10px;align-items:flex-start;
  padding:10px 14px;border-radius:var(--r-sm);font-size:13px;
  border-left:3px solid;line-height:1.45;
}
.al-warn{background:rgba(245,166,35,.1);border-color:var(--amber);color:var(--amber)}
.al-good{background:rgba(76,175,125,.1);border-color:var(--green);color:var(--green)}
.al-info{background:rgba(144,204,255,.1);border-color:var(--baby);color:var(--baby)}
.al-red{background:rgba(224,82,82,.1);border-color:var(--red);color:var(--red)}
.al-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert strong{color:inherit}

/* ── KPI CARDS ───────────────────────────────────────────────────── */
.kpi-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  margin-bottom:12px;
}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--sh);
}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.kpi-val{
  font-size:22px;font-weight:800;letter-spacing:-.5px;
  font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:3px;
}
@media(min-width:600px){.kpi-val{font-size:24px}}
.kv-white{color:var(--txt)}.kv-green{color:var(--green)}
.kv-orange{color:var(--orange)}.kv-blue{color:var(--baby)}
[data-t="light"] .kv-blue{color:var(--royal)}
.kpi-note{font-size:11px;color:var(--txt3);line-height:1.3}

/* ── INSIGHT CHIPS ───────────────────────────────────────────────── */
.ins-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ins{
  display:flex;gap:8px;align-items:center;
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:8px 12px;font-size:12px;box-shadow:var(--sh);
}
.ins-icon{font-size:15px}
.ins-val{font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
.iv-green{color:var(--green)}.iv-orange{color:var(--orange)}.iv-blue{color:var(--baby)}.iv-red{color:var(--red)}
[data-t="light"] .iv-blue{color:var(--royal)}
.ins-lbl{color:var(--txt2);font-size:11px}
.ins-note{color:var(--txt3);font-size:10px;margin-top:1px}

/* ── SECTION ─────────────────────────────────────────────────────── */
.sec{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:14px;box-shadow:var(--sh);overflow:hidden;
}
.sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--line);
}
.sec-ttl{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2)}
.sec-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:var(--bg2);color:var(--txt3);
}

/* ── PRODUCT TABLE ───────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th{
  padding:9px 12px;text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);
  background:var(--bg2);border-bottom:1px solid var(--line);
  white-space:nowrap;
}
.ptbl th.num,.ptbl td.num{text-align:right;font-family:var(--mono);font-size:12px}
.ptbl td{
  padding:10px 12px;border-bottom:1px solid var(--line);
  color:var(--txt);vertical-align:middle;
}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr{cursor:pointer;transition:background .12s}
.ptbl tr:hover td{background:var(--hover)}
/* Status badges */
.st{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.3px;
}
.st-ok{background:rgba(76,175,125,.15);color:var(--green)}
.st-active{background:rgba(144,204,255,.12);color:var(--baby)}
.st-low{background:rgba(224,82,82,.12);color:var(--red)}
[data-t="light"] .st-active{color:var(--royal);background:rgba(37,35,89,.1)}
/* Expandable detail row */
.exp-row{display:none;background:var(--bg2)}
.exp-row.on{display:table-row}
.exp-cell{padding:14px 16px;border-bottom:1px solid var(--line)}
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.exp-grid{grid-template-columns:repeat(4,1fr)}}
.eg-item{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px}
.eg-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.eg-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
/* Progress bar */
.prog{height:5px;background:var(--bg3);border-radius:99px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pf-green{background:var(--green)}.pf-orange{background:var(--orange)}.pf-red{background:var(--red)}
/* Mobile card-stack table */
@media(max-width:599px){
  .ptbl,.ptbl thead,.ptbl tbody,.ptbl tr,.ptbl th,.ptbl td{display:block}
  .ptbl thead{display:none}
  .ptbl tr{
    border:1px solid var(--line);border-radius:var(--r);
    margin:0 0 10px;overflow:hidden;
  }
  .ptbl tr:hover td{background:none}
  .ptbl td{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 14px;font-size:13px;border-bottom:1px solid var(--line);
    border-radius:0;
  }
  .ptbl td:last-child{border-bottom:none}
  .ptbl td.td-name{
    font-size:14px;font-weight:700;padding:12px 14px 10px;
    background:var(--bg2);flex-direction:column;align-items:flex-start;gap:4px;
  }
  .ptbl td.td-name::before{display:none}
  .ptbl td::before{
    content:attr(data-label);
    font-size:10px;font-weight:700;color:var(--txt3);
    text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-right:12px;
  }
  .ptbl td.num{font-family:var(--mono);font-size:12px}
  .exp-row.on{display:block}
  .exp-cell{display:block}
  .exp-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── YEAR-BY-YEAR ────────────────────────────────────────────────── */
.year-grid{display:flex;flex-wrap:wrap;gap:10px;padding:14px}
.yc{
  flex:1;min-width:140px;background:var(--bg2);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;
}
.yc-yr{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.yc-rev{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:3px}
.yc-share{font-size:12px;color:var(--txt3);font-family:var(--mono)}

/* ── PAYMENT ROWS ────────────────────────────────────────────────── */
.pay-list{padding:0}
.pay-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 16px;border-bottom:1px solid var(--line);
  transition:background .12s;
}
.pay-row:last-child{border-bottom:none}
.pay-row:hover{background:var(--hover)}
.pr-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.pr-dot.paid{background:var(--green)}
.pr-dot.pending{background:var(--amber)}
.pr-dot.future{background:var(--line)}
.pr-main{flex:1;min-width:0}
.pr-mo{font-size:13px;font-weight:600}
.pr-mod{
  display:inline-block;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;margin-left:6px;
  background:var(--bg2);color:var(--txt3);letter-spacing:.3px;
  vertical-align:1px;
}
.pr-mod.mod-a{background:rgba(144,204,255,.12);color:var(--baby)}
.pr-mod.mod-b{background:rgba(243,134,31,.12);color:var(--orange)}
[data-t="light"] .pr-mod.mod-a{color:var(--royal);background:rgba(37,35,89,.1)}
.pr-note{font-size:11px;color:var(--txt3);font-style:italic;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.pr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:1px}
.pr-amt{
  font-family:var(--mono);font-size:13px;font-weight:600;
  font-variant-numeric:tabular-nums;
}
.pr-amt.paid{color:var(--green)}.pr-amt.pending{color:var(--amber)}.pr-amt.future{color:var(--txt3)}
.pr-dt{font-size:11px;color:var(--txt3);font-family:var(--mono);
  display:none}
@media(min-width:480px){.pr-dt{display:block}}
.pr-attach{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;
  background:rgba(144,204,255,.1);border:1px solid rgba(144,204,255,.2);
  color:var(--baby);font-size:13px;text-decoration:none;
  transition:background .15s;flex-shrink:0;
}
.pr-attach:hover{background:rgba(144,204,255,.25)}
.pr-attach-ph{width:28px;height:28px;flex-shrink:0}

/* ── CASH MODULES ────────────────────────────────────────────────── */
.mod-grid{display:flex;flex-direction:column;gap:0}
.mod-row{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:14px 16px;border-bottom:1px solid var(--line);
}
.mod-row:last-child{border-bottom:none}
.mod-name{font-size:14px;font-weight:700;flex:1;min-width:180px}
.mod-tag{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  background:rgba(144,204,255,.12);color:var(--baby);margin-left:6px;
  vertical-align:1px;
}
[data-t="light"] .mod-tag{color:var(--royal);background:rgba(37,35,89,.1)}
.mod-stats{display:flex;flex-wrap:wrap;gap:14px}
.mod-stat{display:flex;flex-direction:column}
.ms-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.ms-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.mod-prog-wrap{width:100%;margin-top:6px}
.mod-prog{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.mod-prog-fill{height:100%;background:var(--baby);border-radius:99px;transition:width .6s ease}

/* ── CHARTS ──────────────────────────────────────────────────────── */
.chart-grid{display:flex;flex-direction:column;gap:14px}
@media(min-width:700px){
  .chart-grid.two{flex-direction:row}
  .chart-grid.two .chart-card{flex:1}
}
.chart-card{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;
}
.chart-hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.chart-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.chart-body{padding:16px;position:relative;height:200px}
@media(min-width:600px){.chart-body{height:220px}}

/* ── LOCK SCREEN ─────────────────────────────────────────────────── */
#sc-lock{
  align-items:center;justify-content:center;
  background:var(--bg0);padding:24px;
}
.lock-box{
  width:100%;max-width:380px;
  background:var(--bg1);border:1px solid var(--line);border-radius:16px;
  padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;
}
.lock-logo{margin-bottom:24px}
.lock-logo img{height:42px;width:auto;mix-blend-mode:lighten}
[data-t="light"] .lock-logo img{mix-blend-mode:multiply;filter:invert(1)}
.lock-ttl{font-size:18px;font-weight:800;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--txt2);margin-bottom:28px}
.pin-row{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--bg3);border:2px solid var(--line);
  transition:all .2s;
}
.pin-dot.filled{background:var(--baby);border-color:var(--baby)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{
  height:56px;border-radius:var(--r);background:var(--bg2);
  color:var(--txt);font-size:20px;font-weight:700;
  transition:all .15s;border:1px solid var(--line);
}
.pin-btn:hover{background:var(--bg3)}
.pin-btn:active{background:var(--hover);transform:scale(.96)}
.pin-del{font-size:18px;color:var(--txt2)}
.lock-err{
  color:var(--red);font-size:13px;font-weight:600;
  margin-top:12px;min-height:20px;animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-hint{font-size:11px;color:var(--txt3);margin-top:16px}

/* ── LOADING ─────────────────────────────────────────────────────── */
#sc-loading{align-items:center;justify-content:center;background:var(--bg0)}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--baby);
  animation:spin .8s linear infinite;
}
.loading-txt{margin-top:14px;font-size:14px;color:var(--txt2)}

/* ── ERROR ───────────────────────────────────────────────────────── */
#sc-error{align-items:center;justify-content:center;background:var(--bg0);padding:24px}
.err-box{
  max-width:440px;background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);padding:28px;text-align:center;box-shadow:var(--sh);
}
.err-icon{font-size:36px;margin-bottom:14px}
.err-ttl{font-size:18px;font-weight:700;margin-bottom:10px;color:var(--red)}
.err-msg{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:18px}
.err-retry{
  padding:10px 22px;border-radius:var(--r-sm);background:var(--baby);
  color:var(--bg0);font-weight:700;font-size:14px;transition:opacity .15s;
}
.err-retry:hover{opacity:.85}

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer{
  text-align:center;padding:20px;font-size:11px;color:var(--txt3);
  border-top:1px solid var(--line);margin-top:4px;
}

/* ── UTIL ────────────────────────────────────────────────────────── */
.mono{font-family:var(--mono)}
</style>
</head>
<body>

<!-- ░░ LOCK SCREEN ░░ -->

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7bG5cHzXy_DSgjKeBhvISB3TNO49oldDhUIkh-JCuXBNkag71DRg38FwG0X-RoQ/pub?single=true&output=csv';
const SHEET_URLS = {
  vinay:      BASE + '&gid=655303961',
  anish:      BASE + '&gid=398267483',
  atik:       BASE + '&gid=239087365',
  bob_demo:   BASE + '&gid=660149875',
  vinay_cash: 'REPLACE_WITH_VINAY_CASH_GID_URL',
};
const PINS = {
  vinay:      '2647',
  anish:      '8391',
  atik:       '5028',
  admin:      '0000',
  bob_demo:   '9999',
};
const PARTNER_IDS = {
  vinay: 'vinay', anish: 'anish', atik: 'atik', admin: 'admin', bob_demo: 'bob_demo',
};
const CACHE = {}, TTL = 5 * 60 * 1000;

// ── STATE ────────────────────────────────────────────────────────────
let currentPartner = null, isAdmin = false, openRow = null;
let vinayView = 'equipment', activeCharts = [];

// ── HELPERS ──────────────────────────────────────────────────────────
function n(v){ const x=parseFloat(String(v).replace(/[,\s]/g,'')); return isNaN(x)?0:x; }
function fmt(v){
  const x=Math.round(n(v));
  if(isNaN(x)||x===0) return '\u20b90';
  if(x>=10000000) return '\u20b9'+(x/10000000).toFixed(1)+'Cr';
  if(x>=100000)   return '\u20b9'+(x/100000).toFixed(1)+'L';
  if(x>=1000)     return '\u20b9'+(x/1000).toFixed(0)+'K';
  return '\u20b9'+x.toLocaleString('en-IN');
}
function fmtFull(v){
  const x=Math.round(n(v));
  if(isNaN(x)) return '\u2014';
  return '\u20b9'+x.toLocaleString('en-IN');
}
function pct(v){ return (n(v)*100).toFixed(1)+'%'; }
function clamp(v,lo,hi){ return Math.min(hi,Math.max(lo,v)); }

// ── CSV PARSER ───────────────────────────────────────────────────────
function parseCSV(txt){
  const rows = [];
  let i=0, len=txt.length;
  while(i<len){
    const row=[];
    while(i<len && txt[i]!=='\n'){
      if(txt[i]==='"'){
        i++; let cell='';
        while(i<len){
          if(txt[i]==='"' && txt[i+1]==='"'){ cell+='"'; i+=2; }
          else if(txt[i]==='"'){ i++; break; }
          else { cell+=txt[i++]; }
        }
        row.push(cell);
        if(i<len && txt[i]===',') i++;
      } else {
        let cell='';
        while(i<len && txt[i]!==',' && txt[i]!=='\n'){ cell+=txt[i++]; }
        row.push(cell);
        if(i<len && txt[i]===',') i++;
      }
    }
    if(i<len) i++; // skip \n
    if(row.some(c=>c.trim())) rows.push(row);
  }
  return rows;
}

function parseDashboard(rows){
  const d = {kv:{}, products:[], yearly:[], payments:[], modules:[]};
  let mode='kv', headers=[];
  for(let i=0;i<rows.length;i++){
    const row=rows[i], first=(row[0]||'').trim();
    if(first==='PRODUCTS_START'){ mode='prod_hdr'; continue; }
    if(first==='YEARLY_START'){   mode='year_hdr'; continue; }
    if(first==='PAYMENTS_START'){ mode='pay_hdr';  continue; }
    if(first==='MODULES_START'){  mode='mod_hdr';  continue; }
    if(mode==='kv'){
      if(first) d.kv[first]=(row[1]||'').trim();
    } else if(mode==='prod_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='prod';
    } else if(mode==='prod'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      d.products.push(obj);
    } else if(mode==='year_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='year';
    } else if(mode==='year'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.year) d.yearly.push(obj);
    } else if(mode==='pay_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='pay';
    } else if(mode==='pay'){
      if(!first) continue;
      // Skip extra human-readable header row (v3 Sheet backward compat)
      const fu=first.toUpperCase().replace(/[^A-Z]/g,'');
      if(fu==='MONTHYEAR'||fu==='MONTH') continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.month_year) d.payments.push(obj);
    } else if(mode==='mod_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='mod';
    } else if(mode==='mod'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.module_name) d.modules.push(obj);
    }
  }
  return d;
}

function buildDashData(pid, raw){
  const d = parseDashboard(raw);
  const kv = d.kv;
  const type = (kv.partner_type||'equipment').trim();
  return {
    id: pid, type, name: kv.partner_name||pid, isDemo: false,
    lbl: type==='cash' ? 'Cash Investment' : 'Equipment Portfolio',
    sub: kv.agreement||'',
    lastUpdated: kv.last_updated||'',
    splitPct: n(kv.split_pct),
    totalInv: n(kv.total_investment||0),
    totalGross: n(kv.total_gross||0),
    totalShare: n(kv.total_your_share||0),
    monthsActive: n(kv.months_active||1),
    avgMonthly: n(kv.avg_monthly_share||0),
    roiPct: n(kv.annualised_roi_pct||0),
    totalDeployed: n(kv.total_deployed||0),
    totalPaid: n(kv.total_paid||0),
    paymentsMade: n(kv.payments_made||0),
    annualReturn: n(kv.annual_return||0),
    nextAmt: n(kv.next_payment_amount||0),
    // BUG FIX: '0-Jan-1900' appears when pending row has no date filled yet
    // (Excel epoch 0 formatted as date). Replace with 'Pending'.
    nextDate: (kv.next_payment_date||'').includes('1900') ? 'Pending' : (kv.next_payment_date||''),
    capitalRetPct: n(kv.capital_returned_pct||0),
    // BUG FIX: ytd_2026 = 0 from Sheet due to type mismatch in SUMPRODUCT formula
    // (Sheet stores year as text "2026", formula compares to number 2026 → always FALSE).
    // Fallback: compute directly from the parsed payments array when Sheet returns 0.
    ytd2026: (function(){
      const fromSheet = n(kv.ytd_2026||0);
      if(fromSheet > 0) return fromSheet;
      // Compute from payments: sum all 'paid' rows whose month_year contains current year
      const yr = new Date().getFullYear().toString();
      return (d.payments||[])
        .filter(p => p.status==='paid' && (p.month_year||'').includes(yr))
        .reduce((s,p) => s + n(p.amount), 0);
    })(),
    products: d.products,
    yearly: d.yearly,
    payments: d.payments,
    modules: d.modules,
  };
}

// ── DATA FETCHING ─────────────────────────────────────────────────────
async function fetchPartner(id, force=false){
  if(!force && CACHE[id] && (Date.now()-CACHE[id].ts)<TTL) return CACHE[id].data;
  // Demo data for bob_demo always, and fallback for vinay_cash placeholder
  if(id==='bob_demo') return demoBob();
  const url = SHEET_URLS[id];
  if(!url || url.startsWith('REPLACE')) throw new Error('Sheet URL not configured for '+id);
  document.getElementById('loading-txt').textContent='Loading '+id+' dashboard…';
  const res = await fetch(url, {cache: force?'no-store':'default'});
  if(!res.ok) throw new Error('HTTP '+res.status+' fetching '+id);
  const text = await res.text();
  const rows = parseCSV(text);
  if(!rows.length) throw new Error('Empty response for '+id);
  const data = buildDashData(id, rows);
  CACHE[id] = {data, ts: Date.now()};
  return data;
}

function renderPayments(pays, maxShow=999){
  if(!pays.length) return '<p style="color:var(--txt3);font-size:13px;padding:16px">No payment records.</p>';
  const visible=pays.filter(p=>p.month_year).slice(0,maxShow);
  return '<div class="pay-list">'+visible.map(p=>{
    const st=(p.status||'future').toLowerCase();
    const mod=(p.module||'').trim();
    let modTag='';
    if(mod){
      const cls=mod.toUpperCase()==='A'?'mod-a':mod.toUpperCase()==='B'?'mod-b':'';
      modTag=`<span class="pr-mod ${cls}">${mod}</span>`;
    }
    const hasAtt=p.attachment_url&&p.attachment_url.startsWith('http');
    const hasNote=p.notes&&p.notes.trim();
    const att=hasAtt
      ?`<a class="pr-attach" href="${p.attachment_url}" target="_blank" rel="noopener" title="View proof">&#128206;</a>`
      :`<span class="pr-attach-ph"></span>`;
    return `<div class="pay-row">

      <div class="pr-main">

}

// ── DASHBOARD RENDER ──────────────────────────────────────────────────
async function renderDashboard(id, force=false){
  openRow=null; destroyCharts();
  showScreen('loading');
  try{
    let d;
    if(id==='bob_demo') d=demoBob();
    else if(id==='vinay_cash' && SHEET_URLS.vinay_cash.startsWith('REPLACE')) d=demoVinayCash();
    else d=await fetchPartner(id,force);

    currentPartner=id;
    const isVinay=(id==='vinay'||id==='vinay_cash');
    const st=document.getElementById('vinay-sub-tabs');
    if(st) st.classList.toggle('on',isVinay);

    document.getElementById('pg-lbl').textContent=d.lbl;
    document.getElementById('pg-name').textContent=d.name;
    document.getElementById('sync-txt').textContent='LIVE · '+d.lastUpdated;
    document.getElementById('demo-badge-wrap').innerHTML=d.isDemo
      ?'<div class="demo-badge">🎬 DEMO PREVIEW — Not Live Data</div>':'';

    renderAlerts(d);
    renderKPICards(d);
    renderInsights(d);

    if(d.type==='cash'){ renderCash(d); }
    else { renderProducts(d); }

    showScreen('main');

    requestAnimationFrame(()=>{
      if(d.type==='equipment') buildEquipCharts(d);
      else buildCashCharts(d);
    });
  } catch(err){
    console.error(err);
    document.getElementById('err-msg').innerHTML='<strong>'+err.message+'</strong><br><br>Check: 1) Sheet is published as CSV · 2) The published URL is current · 3) Internet connection is active.';
    showScreen('error');
  }
}

async function handleRefresh(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.disabled=true;
  const id=(currentPartner==='vinay'&&vinayView==='cash')?'vinay_cash':currentPartner;
  if(id){ delete CACHE[id]; await renderDashboard(id,true); }
  btn.classList.remove('spinning'); btn.disabled=false;
}

function retryLoad(){
  if(currentPartner) renderDashboard(currentPartner,true);
  else showScreen('lock');
}

function buildAdminTabs(){
  const tabs=[
    {id:'vinay',lbl:'Vinay Equipment'},

    {id:'bob_demo',lbl:'Bob Demo'},

function switchPartner(pid){
  currentPartner=pid; openRow=null;
  buildAdminTabs();
  const st=document.getElementById('vinay-sub-tabs');
  if(st){ const isV=(pid==='vinay'); st.classList.toggle('on',isV); }
  if(pid==='vinay'){ vinayView='equipment'; syncVinayTabs(); }
  renderDashboard(pid);
}

function switchVinayView(view){
  vinayView=view; syncVinayTabs();
  renderDashboard(view==='cash'?'vinay_cash':'vinay');
}

function syncVinayTabs(){
  const e=document.getElementById('vsub-equip');
  const c=document.getElementById('vsub-cash');
  if(e){ e.classList.toggle('on',vinayView==='equipment'); }
  if(c){ c.classList.toggle('on',vinayView==='cash'); }
}

// ── AUTH ──────────────────────────────────────────────────────────────
let pinBuffer='', pinPartner='', pinFailCount=0;
function showScreen(s){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('on'));
  document.getElementById('sc-'+s).classList.add('on');
}

function updatePinDots(){
  for(let i=0;i<4;i++)
    document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
}

function pinKey(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d; updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}

function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1); updatePinDots();
  document.getElementById('lock-err').textContent='';
}

function checkPin(){
  // Find which partner this PIN belongs to
  for(const [pid,pin] of Object.entries(PINS)){
    if(pin===pinBuffer){
      pinFailCount=0; pinBuffer=''; updatePinDots();
      document.getElementById('lock-err').textContent='';
      activatePartner(pid);
      return;
    }
  }
  pinFailCount++;
  document.getElementById('lock-err').textContent=
    pinFailCount>=3?'Too many attempts. Try: 2647 (Vinay), 0000 (Admin)':'Incorrect PIN. Try again.';
  pinBuffer=''; updatePinDots();
}

function activatePartner(pid){
  isAdmin=(pid==='admin');
  const adminTabs=document.getElementById('admin-tabs');
  if(isAdmin){ adminTabs.classList.add('on'); buildAdminTabs(); renderDashboard('vinay'); }
  else { adminTabs.classList.remove('on'); renderDashboard(pid); }
}

function handleLogout(){
  currentPartner=null; isAdmin=false; pinBuffer=''; updatePinDots();
  document.getElementById('lock-err').textContent='';
  destroyCharts();
  showScreen('lock');
}

function toggleTheme(){
  const t=document.documentElement.getAttribute('data-t')==='dark'?'light':'dark';
  setTheme(t);
}
function setTheme(t){
  document.documentElement.setAttribute('data-t',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'\u2600':'\u263d';
  localStorage.setItem('dslr_theme',t);
  // Rebuild charts with new colors
  if(currentPartner){ requestAnimationFrame(()=>{ destroyCharts(); const d=CACHE[currentPartner]?.data; if(d){if(d.type==='equipment')buildEquipCharts(d);else buildCashCharts(d);} }); }
}

// ── KEYBOARD SUPPORT ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const sc=document.querySelector('.screen.on');
  if(!sc||sc.id!=='sc-lock') return;
  if(e.key>='0'&&e.key<='9') pinKey(e.key);
  else if(e.key==='Backspace') pinDel();
  else if(e.key==='Enter'&&pinBuffer.length===4) checkPin();
});

// ── INIT ──────────────────────────────────────────────────────────────
(function init(){
  const saved=localStorage.getItem('dslr_theme');
  if(saved) setTheme(saved);
  else setTheme('dark');
  checkURLToken();
  showScreen('lock');
})();
</script>
