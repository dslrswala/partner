<!DOCTYPE html>
<html lang="en" data-t="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f1a">
<title>DSLRSWALA Partner Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────────── */
:root{
  --royal:#252359;--baby:#90CCFF;--orange:#F3861F;
  --green:#4CAF7D;--red:#E05252;--amber:#F5A623;
  --bg0:#0d0f1a;--bg1:#141629;--bg2:#1c1f38;--bg3:#242848;
  --txt:#f0f2ff;--txt2:#8892b0;--txt3:#505878;
  --line:#2a2f52;--hover:#1e2240;
  --sh:0 2px 12px rgba(0,0,0,.4);
  --r:10px;--r-sm:6px;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-t="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f6fb;--bg3:#eceef6;
  --txt:#1a1c2e;--txt2:#4a5068;--txt3:#9098b8;
  --line:#dde0ee;--hover:#f0f1fa;
  --sh:0 2px 12px rgba(37,35,89,.08);
}

/* ── RESET ───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);font-size:16px;line-height:1.5;
  background:var(--bg0);color:var(--txt);min-height:100vh;
  -webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input{font-family:var(--font)}
a{color:var(--baby)}

/* ── SCREENS ────────────────────────────────────────────────────── */
.screen{display:none;min-height:100vh}
.screen.on{display:flex;flex-direction:column}

/* ── TOPBAR ─────────────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;height:56px;
  background:var(--bg1);border-bottom:1px solid var(--line);
  box-shadow:var(--sh);
}
.topbar .logo img{height:30px;width:auto;mix-blend-mode:lighten;vertical-align:middle}
[data-t="light"] .topbar .logo img{mix-blend-mode:multiply;filter:invert(1)}
.topbar .pg-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);flex-shrink:0}
.topbar .pg-name{font-size:15px;font-weight:700;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sync{font-size:10px;font-family:var(--mono);color:var(--txt3);flex-shrink:0;display:none}
@media(min-width:480px){.topbar .sync{display:block}}
.tb-btn{width:36px;height:36px;border-radius:8px;background:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--txt2);font-size:15px;transition:background .15s;flex-shrink:0}
.tb-btn:hover{background:var(--hover)}
.spinning{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ADMIN TABS ─────────────────────────────────────────────────── */
.admin-tabs{
  display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--bg1);border-bottom:1px solid var(--line);
  padding:0 16px;
}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tabs.on{display:flex;gap:2px;flex-wrap:nowrap}
.ptab{
  padding:10px 16px;font-size:12px;font-weight:700;
  color:var(--txt2);background:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;min-height:44px;
  letter-spacing:.3px;
}
.ptab:hover{color:var(--txt)}
.ptab.on{color:var(--baby);border-color:var(--baby)}

/* ── WRAPPER ────────────────────────────────────────────────────── */
.wrap{width:100%;max-width:980px;margin:0 auto;padding:16px}
@media(min-width:768px){.wrap{padding:20px 24px}}

/* ── DEMO BADGE ─────────────────────────────────────────────────── */
.demo-badge{
  background:linear-gradient(90deg,var(--amber) 0%,var(--orange) 100%);
  color:#1a0a00;font-size:11px;font-weight:700;letter-spacing:.8px;
  text-align:center;padding:7px 16px;border-radius:var(--r-sm);
  margin-bottom:14px;
}

/* ── VINAY SUB-TABS ─────────────────────────────────────────────── */
.sub-tabs-wrap{display:none;margin-bottom:14px}
.sub-tabs-wrap.on{display:block}
.sub-tabs{
  display:flex;background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);
}
.sub-tab{
  flex:1;padding:11px 16px;font-size:12px;font-weight:700;
  color:var(--txt2);background:none;transition:all .18s;
  border-right:1px solid var(--line);letter-spacing:.3px;
  min-height:44px;
}
.sub-tab:last-child{border-right:none}
.sub-tab:hover{background:var(--hover);color:var(--txt)}
.sub-tab.on{background:var(--royal);color:var(--baby)}

/* ── ALERTS ─────────────────────────────────────────────────────── */
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.alert{
  display:flex;gap:10px;align-items:flex-start;
  padding:10px 14px;border-radius:var(--r-sm);font-size:13px;
  border-left:3px solid;line-height:1.45;
}
.al-warn{background:rgba(245,166,35,.1);border-color:var(--amber);color:var(--amber)}
.al-good{background:rgba(76,175,125,.1);border-color:var(--green);color:var(--green)}
.al-info{background:rgba(144,204,255,.1);border-color:var(--baby);color:var(--baby)}
.al-red{background:rgba(224,82,82,.1);border-color:var(--red);color:var(--red)}
.al-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert strong{color:inherit}

/* ── KPI CARDS ───────────────────────────────────────────────────── */
.kpi-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  margin-bottom:12px;
}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--sh);
}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.kpi-val{
  font-size:22px;font-weight:800;letter-spacing:-.5px;
  font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:3px;
}
@media(min-width:600px){.kpi-val{font-size:24px}}
.kv-white{color:var(--txt)}.kv-green{color:var(--green)}
.kv-orange{color:var(--orange)}.kv-blue{color:var(--baby)}
[data-t="light"] .kv-blue{color:var(--royal)}
.kpi-note{font-size:11px;color:var(--txt3);line-height:1.3}

/* ── INSIGHT CHIPS ───────────────────────────────────────────────── */
.ins-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ins{
  display:flex;gap:8px;align-items:center;
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:8px 12px;font-size:12px;box-shadow:var(--sh);
}
.ins-icon{font-size:15px}
.ins-val{font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
.iv-green{color:var(--green)}.iv-orange{color:var(--orange)}.iv-blue{color:var(--baby)}.iv-red{color:var(--red)}
[data-t="light"] .iv-blue{color:var(--royal)}
.ins-lbl{color:var(--txt2);font-size:11px}
.ins-note{color:var(--txt3);font-size:10px;margin-top:1px}

/* ── SECTION ─────────────────────────────────────────────────────── */
.sec{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:14px;box-shadow:var(--sh);overflow:hidden;
}
.sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--line);
}
.sec-ttl{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2)}
.sec-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:var(--bg2);color:var(--txt3);
}

/* ── PRODUCT TABLE ───────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th{
  padding:9px 12px;text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);
  background:var(--bg2);border-bottom:1px solid var(--line);
  white-space:nowrap;
}
.ptbl th.num,.ptbl td.num{text-align:right;font-family:var(--mono);font-size:12px}
.ptbl td{
  padding:10px 12px;border-bottom:1px solid var(--line);
  color:var(--txt);vertical-align:middle;
}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr{cursor:pointer;transition:background .12s}
.ptbl tr:hover td{background:var(--hover)}
/* Status badges */
.st{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.3px;
}
.st-ok{background:rgba(76,175,125,.15);color:var(--green)}
.st-active{background:rgba(144,204,255,.12);color:var(--baby)}
.st-low{background:rgba(224,82,82,.12);color:var(--red)}
[data-t="light"] .st-active{color:var(--royal);background:rgba(37,35,89,.1)}
/* Expandable detail row */
.exp-row{display:none;background:var(--bg2)}
.exp-row.on{display:table-row}
.exp-cell{padding:14px 16px;border-bottom:1px solid var(--line)}
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.exp-grid{grid-template-columns:repeat(4,1fr)}}
.eg-item{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px}
.eg-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.eg-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
/* Progress bar */
.prog{height:5px;background:var(--bg3);border-radius:99px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pf-green{background:var(--green)}.pf-orange{background:var(--orange)}.pf-red{background:var(--red)}
/* Mobile card-stack table */
@media(max-width:599px){
  .ptbl,.ptbl thead,.ptbl tbody,.ptbl tr,.ptbl th,.ptbl td{display:block}
  .ptbl thead{display:none}
  .ptbl tr{
    border:1px solid var(--line);border-radius:var(--r);
    margin:0 0 10px;overflow:hidden;
  }
  .ptbl tr:hover td{background:none}
  .ptbl td{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 14px;font-size:13px;border-bottom:1px solid var(--line);
    border-radius:0;
  }
  .ptbl td:last-child{border-bottom:none}
  .ptbl td.td-name{
    font-size:14px;font-weight:700;padding:12px 14px 10px;
    background:var(--bg2);flex-direction:column;align-items:flex-start;gap:4px;
  }
  .ptbl td.td-name::before{display:none}
  .ptbl td::before{
    content:attr(data-label);
    font-size:10px;font-weight:700;color:var(--txt3);
    text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-right:12px;
  }
  .ptbl td.num{font-family:var(--mono);font-size:12px}
  .exp-row.on{display:block}
  .exp-cell{display:block}
  .exp-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── YEAR-BY-YEAR ────────────────────────────────────────────────── */
.year-grid{display:flex;flex-wrap:wrap;gap:10px;padding:14px}
.yc{
  flex:1;min-width:140px;background:var(--bg2);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;
}
.yc-yr{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.yc-rev{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:3px}
.yc-share{font-size:12px;color:var(--txt3);font-family:var(--mono)}

/* ── PAYMENT ROWS ────────────────────────────────────────────────── */
.pay-list{padding:0}
.pay-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 16px;border-bottom:1px solid var(--line);
  transition:background .12s;
}
.pay-row:last-child{border-bottom:none}
.pay-row:hover{background:var(--hover)}
.pr-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.pr-dot.paid{background:var(--green)}
.pr-dot.pending{background:var(--amber)}
.pr-dot.future{background:var(--line)}
.pr-main{flex:1;min-width:0}
.pr-mo{font-size:13px;font-weight:600}
.pr-mod{
  display:inline-block;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;margin-left:6px;
  background:var(--bg2);color:var(--txt3);letter-spacing:.3px;
  vertical-align:1px;
}
.pr-mod.mod-a{background:rgba(144,204,255,.12);color:var(--baby)}
.pr-mod.mod-b{background:rgba(243,134,31,.12);color:var(--orange)}
[data-t="light"] .pr-mod.mod-a{color:var(--royal);background:rgba(37,35,89,.1)}
.pr-note{font-size:11px;color:var(--txt3);font-style:italic;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.pr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:1px}
.pr-amt{
  font-family:var(--mono);font-size:13px;font-weight:600;
  font-variant-numeric:tabular-nums;
}
.pr-amt.paid{color:var(--green)}.pr-amt.pending{color:var(--amber)}.pr-amt.future{color:var(--txt3)}
.pr-dt{font-size:11px;color:var(--txt3);font-family:var(--mono);
  display:none}
@media(min-width:480px){.pr-dt{display:block}}
.pr-attach{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;
  background:rgba(144,204,255,.1);border:1px solid rgba(144,204,255,.2);
  color:var(--baby);font-size:13px;text-decoration:none;
  transition:background .15s;flex-shrink:0;
}
.pr-attach:hover{background:rgba(144,204,255,.25)}
.pr-attach-ph{width:28px;height:28px;flex-shrink:0}

/* ── CASH MODULES ────────────────────────────────────────────────── */
.mod-grid{display:flex;flex-direction:column;gap:0}
.mod-row{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:14px 16px;border-bottom:1px solid var(--line);
}
.mod-row:last-child{border-bottom:none}
.mod-name{font-size:14px;font-weight:700;flex:1;min-width:180px}
.mod-tag{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  background:rgba(144,204,255,.12);color:var(--baby);margin-left:6px;
  vertical-align:1px;
}
[data-t="light"] .mod-tag{color:var(--royal);background:rgba(37,35,89,.1)}
.mod-stats{display:flex;flex-wrap:wrap;gap:14px}
.mod-stat{display:flex;flex-direction:column}
.ms-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.ms-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.mod-prog-wrap{width:100%;margin-top:6px}
.mod-prog{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.mod-prog-fill{height:100%;background:var(--baby);border-radius:99px;transition:width .6s ease}

/* ── CHARTS ──────────────────────────────────────────────────────── */
.chart-grid{display:flex;flex-direction:column;gap:14px}
@media(min-width:700px){
  .chart-grid.two{flex-direction:row}
  .chart-grid.two .chart-card{flex:1}
}
.chart-card{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;
}
.chart-hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.chart-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.chart-body{padding:16px;position:relative;height:200px}
@media(min-width:600px){.chart-body{height:220px}}

/* ── LOCK SCREEN ─────────────────────────────────────────────────── */
/* Always dark — independent of theme toggle */
#sc-lock{
  align-items:center;justify-content:center;
  background:#0a0b14;padding:24px;
}
.lock-box{
  width:100%;max-width:340px;
  background:#141629;
  border:1px solid rgba(144,204,255,.12);
  border-radius:20px;
  padding:36px 28px 28px;
  box-shadow:0 24px 64px rgba(0,0,0,.7),0 0 0 1px rgba(144,204,255,.04);
  text-align:center;
}
.lock-logo{margin-bottom:20px}
.lock-logo img{height:34px;width:auto;mix-blend-mode:lighten;opacity:.9}
.lock-ttl{
  font-size:17px;font-weight:700;color:#f0f2ff;
  margin-bottom:4px;letter-spacing:-.2px;
}
.lock-sub{font-size:12px;color:#505878;margin-bottom:24px}
/* PIN dot row */
.pin-row{
  display:flex;justify-content:center;gap:14px;
  margin-bottom:24px;
}
.pin-dot{
  width:11px;height:11px;border-radius:50%;
  background:#2a2f52;border:2px solid #343a60;
  transition:all .18s cubic-bezier(.4,0,.2,1);
}
.pin-dot.filled{
  background:#90CCFF;border-color:#90CCFF;
  box-shadow:0 0 10px rgba(144,204,255,.4);
}
/* PIN grid */
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{
  height:54px;
  border-radius:12px;
  background:#1c1f38;
  border:1px solid #2a2f52;
  color:#e0e4ff;
  font-size:21px;font-weight:600;
  font-family:var(--font);
  transition:background .12s,transform .08s;
  cursor:pointer;
}
.pin-btn:hover{background:#252848;border-color:#3a3f60}
.pin-btn:active{background:#1a1d30;transform:scale(.94)}
.pin-del{font-size:18px;color:#505878}
.lock-err{
  color:#E05252;font-size:12px;font-weight:600;
  min-height:18px;margin-top:14px;
  animation:shake .28s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lock-hint{font-size:10px;color:#505878;margin-top:10px;line-height:1.4}
/* ── LOADING ─────────────────────────────────────────────────────── */
#sc-loading{align-items:center;justify-content:center;background:var(--bg0)}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--baby);
  animation:spin .8s linear infinite;
}
.loading-txt{margin-top:14px;font-size:14px;color:var(--txt2)}

/* ── ERROR ───────────────────────────────────────────────────────── */
#sc-error{align-items:center;justify-content:center;background:var(--bg0);padding:24px}
.err-box{
  max-width:440px;background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);padding:28px;text-align:center;box-shadow:var(--sh);
}
.err-icon{font-size:36px;margin-bottom:14px}
.err-ttl{font-size:18px;font-weight:700;margin-bottom:10px;color:var(--red)}
.err-msg{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:18px}
.err-retry{
  padding:10px 22px;border-radius:var(--r-sm);background:var(--baby);
  color:var(--bg0);font-weight:700;font-size:14px;transition:opacity .15s;
}
.err-retry:hover{opacity:.85}

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer{
  text-align:center;padding:20px;font-size:11px;color:var(--txt3);
  border-top:1px solid var(--line);margin-top:4px;
}

/* ── UTIL ────────────────────────────────────────────────────────── */
.mono{font-family:var(--mono)}

/* ── INVESTMENT TERMS ─────────────────────────────── */
.terms-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;background:none;cursor:pointer;font-family:inherit;text-align:left}
.terms-toggle:hover{background:var(--hover)}
.terms-body{display:none;padding:0 16px 16px}
.terms-body.open{display:block}
.terms-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:2px}
@media(min-width:600px){.terms-grid{grid-template-columns:repeat(3,1fr)}}
.term-card{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.term-header{padding:10px 14px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px}
.tc-monthly  .term-header{background:rgba(144,204,255,.12);color:var(--baby)}
.tc-quarterly .term-header{background:rgba(243,134,31,.12);color:var(--orange)}
.tc-sessional .term-header{background:rgba(76,175,125,.12);color:var(--green)}
[data-t="light"] .tc-monthly  .term-header{color:var(--royal);background:rgba(37,35,89,.08)}
[data-t="light"] .tc-quarterly .term-header{color:#92400e;background:#fffbeb}
[data-t="light"] .tc-sessional .term-header{color:#166634;background:#f0fdf4}
.term-body{padding:12px 14px;font-size:12px;color:var(--txt2);line-height:1.6;
  background:var(--bg1)}
.term-body strong{color:var(--txt);font-weight:600}
.t-rate{font-size:20px;font-weight:800;letter-spacing:-.3px;
  font-variant-numeric:tabular-nums;margin:6px 0 4px}
.t-sub{font-size:11px;color:var(--txt3)}
#demo-sub-tabs{display:none;margin-bottom:14px}
#demo-sub-tabs.on{display:block}

/* ── AGREEMENT SUMMARY BAR ─────────────────────────────────────── */
.info-bar{
  background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;margin-bottom:12px;box-shadow:var(--sh);
}
.ib-row{display:flex;flex-wrap:wrap;gap:8px 20px;align-items:stretch}
.ib-item{display:flex;flex-direction:column;gap:2px;min-width:80px}
.ib-lbl{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:var(--txt3);
}
.ib-val{
  font-size:14px;font-weight:700;color:var(--txt);
  font-variant-numeric:tabular-nums;line-height:1.2;
}
.ib-val.blue  {color:var(--baby)}
.ib-val.green {color:var(--green)}
.ib-val.orange{color:var(--orange)}
[data-t="light"] .ib-val.blue{color:var(--royal)}
.ib-divider{width:1px;background:var(--line);align-self:stretch;margin:0 4px;display:none}
@media(min-width:480px){.ib-divider{display:block}}
/* Share donut mini */
.share-visual{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border-top:1px solid var(--line);margin-top:10px;
}
.share-bars{display:flex;height:8px;border-radius:99px;overflow:hidden;flex:1;max-width:200px;gap:1px}
.share-seg{height:100%;transition:flex .4s}
.share-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px}
.sl-item{display:flex;align-items:center;gap:5px;color:var(--txt2)}
.sl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}


/* ── ERROR HANDLING UI ──────────────────────────────── */
/* Toast notifications (user-facing) */
#toast-container{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;width:min(90vw,400px);
}
.toast{
  padding:12px 16px;border-radius:var(--r-sm);
  font-size:13px;line-height:1.45;font-family:var(--font);
  box-shadow:0 4px 24px rgba(0,0,0,.4);
  display:flex;gap:10px;align-items:flex-start;
  pointer-events:all;animation:toast-in .25s ease;
  opacity:1;transition:opacity .3s;
}
.toast.out{opacity:0}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.toast-error  {background:#2D0A0A;border:1px solid var(--red);  color:#FCA5A5}
.toast-warn   {background:#292100;border:1px solid var(--amber);color:#FCD34D}
.toast-info   {background:#172036;border:1px solid var(--baby); color:#93C5FD}
.toast-success{background:#052E16;border:1px solid var(--green);color:#86EFAC}
[data-t="light"] .toast-error  {background:#FEF2F2;color:#B91C1C}
[data-t="light"] .toast-warn   {background:#FFFBEB;color:#B45309}
[data-t="light"] .toast-info   {background:#EFF6FF;color:#1D4ED8}
[data-t="light"] .toast-success{background:#F0FDF4;color:#15803D}
.toast-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.toast-body{flex:1;min-width:0}
.toast-title{font-weight:700}
.toast-msg{font-size:12px;opacity:.8;margin-top:2px}
.toast-close{
  font-size:16px;cursor:pointer;opacity:.6;flex-shrink:0;
  background:none;border:none;color:inherit;padding:0;font-family:inherit;
}
.toast-close:hover{opacity:1}
/* Dev error panel (hidden by default, shown on JS errors) */
#dev-panel{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#0d0010;border-top:2px solid var(--red);
  color:#FCA5A5;font-family:var(--mono);font-size:11px;
  max-height:200px;overflow-y:auto;z-index:9998;
  padding:8px 14px;
}
#dev-panel.on{display:block}
.dev-row{padding:4px 0;border-bottom:1px solid rgba(220,38,38,.2)}
.dev-row:last-child{border-bottom:none}
.dev-time{color:#6B7280;margin-right:8px}
.dev-err{color:#FCA5A5}
.dev-src{color:#9CA3AF;font-size:10px;margin-top:2px}
/* Inline section error state */
.sec-error{
  padding:16px;font-size:13px;color:var(--red);
  display:flex;gap:10px;align-items:center;
}


/* ── PAYMENT YEAR GROUP HEADERS ─────────────────── */
.pay-year-group {}
.pay-year-hdr {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 9px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: background .12s;
  gap: 0;
}
.pay-year-hdr:hover { background: var(--hover); }
.pay-year-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--txt2);
  text-transform: uppercase;
  letter-spacing: .5px;
  flex-shrink: 0;
}
.pay-year-summary {
  font-size: 11px;
  color: var(--txt3);
  font-family: var(--mono);
  flex: 1;
  text-align: right;
  padding-right: 10px;
}
.pay-year-chev {
  font-size: 10px;
  color: var(--txt3);
  transition: transform .2s;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}
.pay-year-chev.collapsed { transform: rotate(-90deg); }
.pay-year-body { border-bottom: 1px solid var(--line); }
.pay-year-body.collapsed { display: none; }

</style>
</head>

// ════════════════════════════════════════════════════
// ERROR HANDLING — Industry-standard 3-layer approach:
//   1. Global uncaught errors  → dev panel + user toast
//   2. Unhandled promise rejections → same
//   3. Per-function try/catch  → inline section errors
// ════════════════════════════════════════════════════

const ERR_LOG = [];  // Rolling log of last 50 errors

// ── Toast notification system ─────────────────────────
const Toast = {
  show(type, title, msg, duration=5000) {
    const wrap = document.getElementById('toast-container');
    if (!wrap) return;
    const icons = {error:'⛔',warn:'⚠️',info:'ℹ️',success:'✅'};
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span>
      <div class="toast-body">
        <div class="toast-title">${title}</div>
        ${msg?`<div class="toast-msg">${msg}</div>`:''}
      </div>
      <button class="toast-close" onclick="Toast.dismiss(this.closest('.toast'))">&#215;</button>`;
    wrap.appendChild(t);
    if (duration > 0) setTimeout(() => Toast.dismiss(t), duration);
  },
  dismiss(t) {
    if (!t) return;
    t.classList.add('out');
    setTimeout(() => t && t.remove(), 320);
  },
  error(title, msg)   { Toast.show('error',  title, msg); },
  warn(title, msg)    { Toast.show('warn',   title, msg, 7000); },
  info(title, msg)    { Toast.show('info',   title, msg, 4000); },
  success(title, msg) { Toast.show('success',title, msg, 3000); },
};

// ── Dev error panel ───────────────────────────────────
function logDevError(msg, src, line) {
  const ts = new Date().toTimeString().slice(0,8);
  ERR_LOG.unshift({ts, msg, src, line});
  if (ERR_LOG.length > 50) ERR_LOG.pop();
  const panel = document.getElementById('dev-panel');
  if (!panel) return;
  panel.classList.add('on');
  const row = document.createElement('div');
  row.className = 'dev-row';
  row.innerHTML = `<span class="dev-time">${ts}</span><span class="dev-err">${msg}</span>
    ${src?`<div class="dev-src">${src}${line?' line '+line:''}</div>`:''}`;
  panel.insertBefore(row, panel.firstChild);
  // Cap at 20 visible rows
  while (panel.children.length > 20) panel.removeChild(panel.lastChild);
}

// ── Global uncaught JS errors ─────────────────────────
window.onerror = function(msg, src, line, col, err) {
  const shortSrc = src ? src.split('/').pop() : '';
  logDevError(msg, shortSrc, line);
  // User-friendly message (don't expose raw error details)
  Toast.error('Something went wrong', 'The dashboard encountered an error. Try refreshing.');
  console.error('[DSLRSWALA]', msg, '\n  at', src + ':' + line + ':' + col, '\n', err);
  return false; // Let browser default handling proceed
};

// ── Unhandled promise rejections ──────────────────────
window.addEventListener('unhandledrejection', function(e) {
  const msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
  logDevError('Unhandled Promise: ' + msg, '', '');
  if (msg && msg.includes('HTTP')) {
    Toast.error('Data load failed', 'Could not fetch dashboard data. Check internet connection.');
  } else {
    Toast.error('Unexpected error', msg.slice(0, 80));
  }
  console.error('[DSLRSWALA] Unhandled rejection:', e.reason);
});

// ── Safe render wrapper — wraps any fn with try/catch ─
function safeRender(fn, sectionId, fallbackMsg) {
  try {
    return fn();
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    logDevError('Render error in ' + (sectionId||'unknown') + ': ' + msg, '', '');
    console.error('[DSLRSWALA] Render error:', sectionId, err);
    // Show inline error in target section if possible
    const el = sectionId ? document.getElementById(sectionId) : null;
    if (el) {
      el.innerHTML = `<div class="sec-error">⚠️ ${fallbackMsg||'Section failed to load. Refresh to retry.'}</div>`;
    }
    return null;
  }
}

// ── Network error helper ──────────────────────────────
function handleFetchError(err, partnerId) {
  const msg = err && err.message ? err.message : String(err);
  logDevError('Fetch error [' + partnerId + ']: ' + msg, '', '');
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('net::')) {
    return 'No internet connection. Connect to WiFi or mobile data and try again.';
  }
  if (msg.includes('HTTP 404') || msg.includes('404')) {
    return 'Data source not found. The Sheet may not be published yet. Contact DSLRSWALA.';
  }
  if (msg.includes('HTTP 4') || msg.includes('HTTP 5')) {
    return 'Server error loading data. Try again in a few minutes.';
  }
  if (msg.includes('REPLACE') || msg.includes('not configured')) {
    return 'This view is not yet connected to live data.';
  }
  return 'Could not load dashboard data. Check connection and try again.';
}

// ── HELPERS ──────────────────────────────────────────────────────────
function n(v){ const x=parseFloat(String(v).replace(/[,\s]/g,'')); return isNaN(x)?0:x; }
function fmt(v){
  const x=Math.round(n(v));
  if(isNaN(x)||x===0) return '\u20b90';
  if(x>=10000000) return '\u20b9'+(x/10000000).toFixed(1)+'Cr';
  if(x>=100000)   return '\u20b9'+(x/100000).toFixed(1)+'L';
  if(x>=1000)     return '\u20b9'+(x/1000).toFixed(0)+'K';
  return '\u20b9'+x.toLocaleString('en-IN');
}
function fmtFull(v){
  const x=Math.round(n(v));
  if(isNaN(x)) return '\u2014';
  return '\u20b9'+x.toLocaleString('en-IN');
}
function pct(v){ return (n(v)*100).toFixed(1)+'%'; }
function clamp(v,lo,hi){ return Math.min(hi,Math.max(lo,v)); }

// ── CSV PARSER ───────────────────────────────────────────────────────
function parseCSV(txt){
  const rows = [];
  let i=0, len=txt.length;
  while(i<len){
    const row=[];
    while(i<len && txt[i]!=='\n'){
      if(txt[i]==='"'){
        i++; let cell='';
        while(i<len){
          if(txt[i]==='"' && txt[i+1]==='"'){ cell+='"'; i+=2; }
          else if(txt[i]==='"'){ i++; break; }
          else { cell+=txt[i++]; }
        }
        row.push(cell);
        if(i<len && txt[i]===',') i++;
      } else {
        let cell='';
        while(i<len && txt[i]!==',' && txt[i]!=='\n'){ cell+=txt[i++]; }
        row.push(cell);
        if(i<len && txt[i]===',') i++;
      }
    }
    if(i<len) i++; // skip \n
    if(row.some(c=>c.trim())) rows.push(row);
  }
  return rows;
}

function parseDashboard(rows){
  const d = {kv:{}, products:[], yearly:[], payments:[], modules:[]};
  let mode='kv', headers=[];
  for(let i=0;i<rows.length;i++){
    const row=rows[i], first=(row[0]||'').trim();
    if(first==='PRODUCTS_START'){ mode='prod_hdr'; continue; }
    if(first==='YEARLY_START'){   mode='year_hdr'; continue; }
    if(first==='PAYMENTS_START'){ mode='pay_hdr';  continue; }
    if(first==='MODULES_START'){  mode='mod_hdr';  continue; }
    if(mode==='kv'){
      if(first) d.kv[first]=(row[1]||'').trim();
    } else if(mode==='prod_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='prod';
    } else if(mode==='prod'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      d.products.push(obj);
    } else if(mode==='year_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='year';
    } else if(mode==='year'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.year) d.yearly.push(obj);
    } else if(mode==='pay_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='pay';
    } else if(mode==='pay'){
      if(!first) continue;
      // Skip extra human-readable header row (v3 Sheet backward compat)
      const fu=first.toUpperCase().replace(/[^A-Z]/g,'');
      if(fu==='MONTHYEAR'||fu==='MONTH') continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.month_year) d.payments.push(obj);
    } else if(mode==='mod_hdr'){
      headers=row.map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
      mode='mod';
    } else if(mode==='mod'){
      if(!first) continue;
      const obj={}; headers.forEach((h,j)=>obj[h]=(row[j]||'').trim());
      if(obj.module_name) d.modules.push(obj);
    }
  }
  return d;
}

function buildDashData(pid, raw){
  const d = parseDashboard(raw);
  const kv = d.kv;
  const type = (kv.partner_type||'equipment').trim();
  return {
    id: pid, type, name: kv.partner_name||pid, isDemo: false,
    lbl: type==='cash' ? 'Capital Investment' : 'Equipment Portfolio',
    sub: kv.agreement||'',
    since: kv.since||'',
    lastUpdated: kv.last_updated||'',
    splitPct: n(kv.split_pct),
    totalInv: n(kv.total_investment||0),
    totalGross: n(kv.total_gross||0),
    totalShare: n(kv.total_your_share||0),
    monthsActive: n(kv.months_active||1),
    avgMonthly: n(kv.avg_monthly_share||0),
    roiPct: n(kv.annualised_roi_pct||0),
    totalDeployed: n(kv.total_deployed||0),
    totalPaid: n(kv.total_paid||0),
    paymentsMade: n(kv.payments_made||0),
    annualReturn: n(kv.annual_return||0),
    nextAmt: n(kv.next_payment_amount||0),
    nextDate: kv.next_payment_date||'',
    capitalRetPct: n(kv.capital_returned_pct||0),
    ytd2026: n(kv.ytd_2026||0),
    products: d.products,
    yearly: d.yearly,
    payments: d.payments,
    modules: d.modules,
  };
}

// ── DATA FETCHING ─────────────────────────────────────────────────────
async function fetchPartner(id, force=false){
  if(!force && CACHE[id] && (Date.now()-CACHE[id].ts)<TTL) return CACHE[id].data;
  // Demo data for bob_demo always, and fallback for vinay_cash placeholder
  if(id==='bob_demo') return demoBob();
  const url = SHEET_URLS[id];
  if(!url || url.startsWith('REPLACE')) throw new Error('Sheet URL not configured for '+id);
  document.getElementById('loading-txt').textContent='Loading '+id+' dashboard…';
  const res = await fetch(url, {cache: force?'no-store':'default'});
  if(!res.ok) throw new Error('HTTP '+res.status+' fetching '+id);
  const text = await res.text();
  const rows = parseCSV(text);
  if(!rows.length) throw new Error('Empty response for '+id);
  const data = buildDashData(id, rows);
  CACHE[id] = {data, ts: Date.now()};
  return data;
}

function renderPayRow(p){

  if(mod){
    const cls=mod.toUpperCase()==='A'?'mod-a':mod.toUpperCase()==='B'?'mod-b':'';

    ?`<a class="pr-attach" href="${p.attachment_url}" target="_blank" rel="noopener" title="View receipt">&#128206;</a>`
    :`<span class="pr-attach-ph"></span>`;

function togglePayYear(btn){
  const body=btn.closest('.pay-year-group').querySelector('.pay-year-body');
  const chev=btn.querySelector('.pay-year-chev');
  const collapsed=body.classList.toggle('collapsed');
  chev.classList.toggle('collapsed',collapsed);
}

function renderPayments(pays){
  if(!pays||!pays.length)
    return '<p style="color:var(--txt3);font-size:13px;padding:16px">No payment records.</p>';
  const valid=pays.filter(p=>p.month_year);
  if(!valid.length)
    return '<p style="color:var(--txt3);font-size:13px;padding:16px">No payment records.</p>';

  // Group by year extracted from month_year (e.g. "Jan-2026" → "2026")
  const groups={};
  valid.forEach(p=>{
    const yr=p.month_year.match(/\d{4}/)?p.month_year.match(/\d{4}/)[0]:'Other';
    if(!groups[yr]) groups[yr]=[];
    groups[yr].push(p);
  });

  // Sorted years: descending (most recent first)
  const years=Object.keys(groups).sort((a,b)=>b-a);

  return '<div class="pay-list">'+years.map(yr=>{
    const rows=groups[yr];
    const paidTotal=rows.filter(r=>r.status==='paid').reduce((s,r)=>s+n(r.amount),0);
    const paidCount=rows.filter(r=>r.status==='paid').length;
    const pendCount=rows.filter(r=>r.status==='pending').length;
    let summary=`${paidCount} paid`;
    if(paidTotal>0) summary+=` · ${fmtFull(paidTotal)}`;
    if(pendCount>0) summary+=` · <span style="color:var(--amber)">${pendCount} pending</span>`;
    return `<div class="pay-year-group">
      <button class="pay-year-hdr" onclick="togglePayYear(this)">
        <span class="pay-year-label">${yr}</span>
        <span class="pay-year-summary">${summary}</span>
        <span class="pay-year-chev">&#9660;</span>
      </button>
      <div class="pay-year-body">
        ${rows.map(renderPayRow).join('')}
      </div>
    </div>`;
  }).join('')+'</div>';
}

// ── RENDER YEARLY ─────────────────────────────────────────────────────
function renderYearly(d, isEquip){
  if(!d.yearly||!d.yearly.length) return '';
  const cells=d.yearly.map(y=>{
    const gross=isEquip?n(y.total_gross_all_items):n(y.total_paid_year);
    const share=isEquip?n(y.your_share_year):null;
    const count=!isEquip?y.payments_count_year:null;
    return `<div class="yc">
      <div class="yc-yr">${y.year}</div>
      <div class="yc-rev">${fmt(gross)}</div>
      <div class="yc-share">${isEquip?'Your share: '+fmt(share):(count+' payments')}</div>
    </div>`;
  }).join('');
  const totalGross=d.yearly.reduce((s,y)=>s+n(isEquip?y.total_gross_all_items:y.total_paid_year),0);
  const totalShare=isEquip?d.yearly.reduce((s,y)=>s+n(y.your_share_year),0):null;
  const allCell=`<div class="yc" style="border-color:var(--baby)">
    <div class="yc-yr" style="color:var(--baby)">All Time</div>
    <div class="yc-rev">${fmt(totalGross)}</div>
    <div class="yc-share" style="color:var(--baby)">${isEquip?'Your total: '+fmt(totalShare):d.paymentsMade+' payments total'}</div>
  </div>`;
  return `<div class="sec">
    <div class="sec-hd"><span class="sec-ttl">Year by Year</span></div>
    <div class="year-grid">${cells}${allCell}</div>
  </div>`;
}

      },options:{...opts,plugins:{...opts.plugins,legend:{display:true,labels:{color:cc.tick,font:{size:10},boxWidth:14}}}}});
      activeCharts.push(ch);
    }

    // Utilisation horizontal bar
    const utilCtx=document.getElementById('c-util');
    if(utilCtx){
      const barColors=utilData.map(v=>v>=30?cc.green:v>=15?cc.orange:cc.red);
      const ch=new Chart(utilCtx,{type:'bar',data:{
        labels:utilLabels,
        datasets:[{data:utilData,backgroundColor:barColors,borderRadius:4,borderSkipped:false}]
      },options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+'% utilisation'}}},
        scales:{
          x:{max:100,grid:{color:cc.grid},ticks:{color:cc.tick,font:{size:10},callback:v=>v+'%'}},
          y:{grid:{display:false},ticks:{color:cc.tick,font:{size:10}}}
        }
      }});
      activeCharts.push(ch);
    }
  });
}

function buildCashCharts(d){
  const el=document.getElementById('charts-area');
  if(!el||!d.yearly.length){ if(el) el.innerHTML=''; return; }

  el.innerHTML=`<div class="chart-card" style="margin-bottom:14px">
    <div class="chart-hd"><span class="chart-ttl">📊 Year-by-Year Payments</span></div>
    <div class="chart-body" style="height:180px"><canvas id="c-yearly"></canvas></div>
  </div>`;

  requestAnimationFrame(()=>{
    const cc=getChartColors();
    const ctx=document.getElementById('c-yearly');
    if(!ctx) return;
    const ch=new Chart(ctx,{type:'bar',data:{
      labels:d.yearly.map(y=>y.year),
      datasets:[{
        label:'Paid',
        data:d.yearly.map(y=>n(y.total_paid_year)),
        backgroundColor:cc.blue,borderRadius:6,
      }]
    },options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'₹'+Math.round(ctx.raw).toLocaleString('en-IN')}}},
      scales:{x:{grid:{color:cc.grid},ticks:{color:cc.tick,font:{size:10}}},
               y:{grid:{color:cc.grid},ticks:{color:cc.tick,font:{size:10},callback:v=>fmt(v)}}}
    }});
    activeCharts.push(ch);
  });
}

// ── DASHBOARD RENDER ──────────────────────────────────────────────────
async function renderDashboard(id, force=false){
  openRow=null; destroyCharts();
  showScreen('loading');
  try{
    let d;
    if(id==='demo_cash')  d=demoCash();
    else if(id==='demo_equip') d=demoEquipment();
    else if(id==='bob_demo') d=demoEquipment(); // backward compat
    else if(id==='vinay_cash' && SHEET_URLS.vinay_cash.startsWith('REPLACE')) d=demoVinayCash();
    else d=await fetchPartner(id,force);

    currentPartner=id;
    const isVinay=(id==='vinay'||id==='vinay_cash');
    const isDemo=(id==='demo_cash'||id==='demo_equip'||id==='demo');
    const st=document.getElementById('vinay-sub-tabs');
    if(st) st.classList.toggle('on',isVinay);
    const dst=document.getElementById('demo-sub-tabs');
    if(dst) dst.classList.toggle('on',isDemo);

    document.getElementById('pg-lbl').textContent=d.lbl;
    document.getElementById('pg-name').textContent=d.name;
    document.getElementById('sync-txt').textContent='LIVE · '+d.lastUpdated;
    // Only show DEMO badge for the actual demo partners (demo_cash / demo_equip)
    // For real partners (vinay, anish, atik) or vinay_cash not yet connected — use different messaging
    const showDemoBadge = d.isDemo && (id==='demo_cash'||id==='demo_equip'||id==='bob_demo');
    const vinayNotConnected = (id==='vinay_cash') && SHEET_URLS.vinay_cash.startsWith('REPLACE');
    document.getElementById('demo-badge-wrap').innerHTML=
      showDemoBadge
        ? '<div class="demo-badge">🎬 DEMO PREVIEW — Sample data, not live</div>'
      : vinayNotConnected
        ? '<div style="background:rgba(144,204,255,.08);border:1px solid rgba(144,204,255,.2);border-radius:6px;padding:8px 14px;margin-bottom:14px;font-size:12px;color:var(--baby)">&#128247; Capital Investment tab — awaiting Sheet connection. Showing estimated data.</div>'
      : '';

    safeRender(()=>renderAlerts(d),    'alerts-area', 'Alerts failed to load');
    safeRender(()=>renderKPICards(d),  'kpi-cards',   'KPI cards failed to load');
    safeRender(()=>renderInsights(d),  'insights',    'Insights failed to load');
    safeRender(()=>renderInfoBar(d),   'info-bar',    null);

    if(d.type==='cash'){
      safeRender(()=>renderCash(d), 'body', 'Investment view failed to load');
    } else {
      safeRender(()=>renderProducts(d), 'body', 'Portfolio view failed to load');
    }

    showScreen('main');
    if(force) Toast.success('Refreshed', 'Data updated as of '+d.lastUpdated);

    requestAnimationFrame(()=>{
      try {
        if(d.type==='equipment') buildEquipCharts(d);
        else buildCashCharts(d);
      } catch(chartErr){
        logDevError('Chart render: '+(chartErr.message||chartErr), '', '');
        console.warn('[DSLRSWALA] Chart error:', chartErr);
        // Charts failing is non-fatal — don't show toast, just log
      }
    });
  } catch(err){
    const userMsg = handleFetchError(err, id);
    logDevError('Dashboard load ['+id+']: '+(err.message||err), '', '');
    console.error('[DSLRSWALA] Dashboard load error for', id, ':', err);
    document.getElementById('err-msg').innerHTML =
      '<strong>Could not load dashboard</strong><br><br>'
      + userMsg
      + '<br><br><span style="font-size:11px;opacity:.6">Error: '+(err.message||'Unknown')+'</span>';
    Toast.error('Dashboard failed to load', userMsg);
    showScreen('error');
  }
}

async function handleRefresh(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.disabled=true;
  const id=(currentPartner==='vinay'&&vinayView==='cash')?'vinay_cash':
            (currentPartner==='demo_cash'||currentPartner==='demo_equip')?currentPartner:
            currentPartner;
  if(id){ delete CACHE[id]; await renderDashboard(id,true); }
  btn.classList.remove('spinning'); btn.disabled=false;
}

function retryLoad(){
  if(currentPartner) renderDashboard(currentPartner,true);
  else showScreen('lock');
}

// ── AUTH ──────────────────────────────────────────────────────────────
let pinBuffer='', pinPartner='', pinFailCount=0;
function showScreen(s){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('on'));
  document.getElementById('sc-'+s).classList.add('on');
}

function updatePinDots(){
  for(let i=0;i<4;i++)
    document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
}

function pinKey(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d; updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}

function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1); updatePinDots();
  document.getElementById('lock-err').textContent='';
}

function checkPin(){
  // Find which partner this PIN belongs to
  for(const [pid,pin] of Object.entries(PINS)){
    if(pin===pinBuffer){
      pinFailCount=0; pinBuffer=''; updatePinDots();
      document.getElementById('lock-err').textContent='';
      activatePartner(pid);
      return;
    }
  }
  pinFailCount++;
  document.getElementById('lock-err').textContent=
    pinFailCount>=3?'Too many attempts. Try: 2647 (Vinay), 0000 (Admin)':'Incorrect PIN. Try again.';
  pinBuffer=''; updatePinDots();
}

function activatePartner(pid){
  isAdmin=(pid==='admin');
  const adminTabs=document.getElementById('admin-tabs');
  if(isAdmin){ adminTabs.classList.add('on'); buildAdminTabs(); renderDashboard('vinay'); }
  else {
    adminTabs.classList.remove('on');
    // Show demo sub-tabs if needed
    const dst=document.getElementById('demo-sub-tabs');
    if(dst) dst.classList.toggle('on', pid==='demo'||pid==='demo_cash'||pid==='demo_equip');
    renderDashboard(pid==='demo'?'demo_cash':pid);
  }
}

function handleLogout(){
  currentPartner=null; isAdmin=false; pinBuffer=''; updatePinDots();
  document.getElementById('lock-err').textContent='';
  destroyCharts();
  showScreen('lock');
}

}

  const params=new URLSearchParams(location.search);
  const t=params.get('t');
  if(!t) return false;
  const tokenMap={
    'vch_VHN7jd7FEkhnVYni-3NJ4w':'vinay',

    'atk_3AuBGbX-DyiLppgKQqvarg':'atik',
    'dsl_7F6hnE3BtRbyQv8bhYI8Rg':'admin',
    'bob_demo_preview_2026': 'demo_cash',
  };
  const pid=tokenMap[t];
  if(pid){
    // Show PIN entry pre-filled with partner
    document.getElementById('lock-hint').textContent='Token detected — enter your PIN to continue';
    return false; // still require PIN
  }

}

// ── KEYBOARD SUPPORT ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const sc=document.querySelector('.screen.on');
  if(!sc||sc.id!=='sc-lock') return;
  if(e.key>='0'&&e.key<='9') pinKey(e.key);
  else if(e.key==='Backspace') pinDel();
  else if(e.key==='Enter'&&pinBuffer.length===4) checkPin();
});

// ── INIT ──────────────────────────────────────────────────────────────
(function init(){
  const saved=localStorage.getItem('dslr_theme');
  if(saved) setTheme(saved);
  else setTheme('dark');
  checkURLToken();
  showScreen('lock');
})();
